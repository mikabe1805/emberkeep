# Codemagic CI — cloud-Mac iOS builds for Emberkeep → TestFlight (see ../NATIVE-iOS.md).
#
# REPO LAYOUT: this file sits at the ROOT of the app's git repo (the `app/` folder
# IS the repo root). Codemagic auto-discovers codemagic.yaml at the root.
#
# SIGNING: EXPLICIT App Store Connect CLI signing (NOT the automatic ios_signing
# block). Two hard-won facts drove this:
#   1. The in-yaml `ios_signing` automatic block is FETCH-ONLY — it never CREATES
#      a missing App Store provisioning profile, which caused "No matching profiles
#      found ... distribution type app_store". Only `fetch-signing-files --create`
#      creates the profile.
#   2. `fetch-signing-files --create` alone re-minted a key-less cert on each fresh
#      VM (Apple never stores private keys) → "No development certificates". Pinning
#      the PERSISTED Distribution cert's private key with `--certificate-key
#      @env:CERTIFICATE_PRIVATE_KEY` makes --create reuse the existing cert.
#   Do NOT also add an `environment.ios_signing` block — mixing the two re-triggers
#   "No matching profiles found".
#
# ONE-TIME PREREQUISITES (see ../NATIVE-iOS.md):
#   * App Store Connect API key integration named `CodemagicASC` (auto-injects auth).
#   * A secret env var `CERTIFICATE_PRIVATE_KEY` in group `emberkeep_signing`,
#     holding the FULL PEM (BEGIN/END lines) of the private key that pairs with the
#     persisted Apple Distribution certificate.
#   * App ID `com.mikabe.emberkeep` registered + app record (Apple ID 6781401469).
#
# PURE SPM: all plugins resolve as Swift Packages; no Podfile / no `pod install`.
# The iOS-15 floor is set by the Runner target's IPHONEOS_DEPLOYMENT_TARGET = 15.0.

workflows:
  ios-testflight:
    name: Emberkeep iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: CodemagicASC # ← your App Store Connect integration name
    environment:
      flutter: stable
      xcode: latest
      groups:
        - emberkeep_signing # ← MUST contain the secret var CERTIFICATE_PRIVATE_KEY
      vars:
        BUNDLE_ID: "com.mikabe.emberkeep"
        # numeric Apple ID of the app record (App Store Connect → App Information)
        APP_STORE_APPLE_ID: 6781401469
    scripts:
      - name: Flutter packages
        script: |
          flutter pub get
      - name: Set up code signing (fetch + create App Store profile, key-safe)
        script: |
          keychain initialize
          # --create makes the App Store profile if missing; --certificate-key pins
          # the PERSISTED Distribution cert's private key so the CLI reuses the
          # existing cert instead of minting a key-less one. API auth = CodemagicASC.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          # use-profiles wires the fetched profile into the Runner target AND writes
          # the export options plist to its default $HOME/export_options.plist.
          # (Under explicit signing $CM_EXPORT_OPTIONS_PLIST is NOT set — only the
          # automatic ios_signing block populates it — so we reference $HOME.)
          xcode-project use-profiles \
            --export-options-plist="$HOME/export_options.plist"
      - name: Flutter build ipa
        script: |
          # First-build-safe build number: a missing/failed TestFlight lookup
          # degrades to 0, so the first CI run is build 1 and later runs increment.
          # The version NAME (1.0.0) comes from pubspec.yaml.
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          flutter build ipa --release \
            --build-number=$((LATEST + 1)) \
            --export-options-plist="$HOME/export_options.plist"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # beta_groups:
        #   - Internal
