# Codemagic CI — cloud-Mac iOS builds for Emberkeep (see ../NATIVE-iOS.md).
#
# REPO LAYOUT: this file sits at the ROOT of the app's git repository (the `app/`
# folder *is* the repo root — see NATIVE-iOS.md "Push to GitHub"). Codemagic
# auto-discovers a codemagic.yaml at the repo root, so no working_directory is set.
#
# Before the FIRST run (all in the Codemagic UI / App Store Connect — see runbook):
#   1. Codemagic → Teams → Integrations → add an "App Store Connect" API key and put
#      its integration name below (replace CodemagicASC).
#   2. Register the App ID `com.mikabe.emberkeep` and create the app record in App
#      Store Connect, then put its numeric Apple ID in APP_STORE_APPLE_ID.
#
# Signing: explicit App Store Connect API signing (fetch-signing-files --create),
# so the distribution cert + provisioning profile are auto-created on first run.

workflows:
  ios-testflight:
    name: Emberkeep iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: CodemagicASC # ← your App Store Connect integration name
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.mikabe.emberkeep"
        # numeric Apple ID of the app record (App Store Connect → App → App Information → "Apple ID")
        APP_STORE_APPLE_ID: 6781401469
    scripts:
      - name: Set up code signing (fetch + create App Store profile)
        script: |
          # Explicit signing: fetch the App Store distribution cert + profile,
          # CREATING them via the App Store Connect API key if they don't exist
          # yet (--create). This is why a brand-new app with no profiles works.
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          # Writes the generated export options plist to its default location,
          # $HOME/export_options.plist (= /Users/builder/export_options.plist on
          # Codemagic). With EXPLICIT signing, Codemagic does NOT populate
          # $CM_EXPORT_OPTIONS_PLIST — that var only exists with automatic
          # environment.ios_signing — so the build step must reference $HOME.
          xcode-project use-profiles \
            --export-options-plist="$HOME/export_options.plist"
      - name: Flutter packages
        script: |
          flutter pub get
      - name: Pod install
        script: |
          cd ios && pod install
      - name: Flutter build ipa
        script: |
          # First-build-safe build number: no prior TestFlight build (or a failed
          # lookup) degrades to 0, so the first CI run produces build 1 and later
          # runs auto-increment. The version NAME (1.0.0) comes from pubspec.yaml.
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          # Point at the plist that `xcode-project use-profiles` wrote in the
          # signing step. Its default output path is $HOME/export_options.plist;
          # $HOME is a built-in that survives across fresh per-step shells.
          flutter build ipa --release \
            --build-number=$((LATEST + 1)) \
            --export-options-plist="$HOME/export_options.plist"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # add beta_groups: [ "Internal" ] to auto-assign your TestFlight testers
