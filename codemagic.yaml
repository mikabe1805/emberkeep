# Codemagic CI — cloud-Mac iOS builds for Emberkeep (see ../NATIVE-iOS.md).
#
# REPO LAYOUT: this file sits at the ROOT of the app's git repository (the `app/`
# folder *is* the repo root). Codemagic auto-discovers a codemagic.yaml at the
# repo root, so no working_directory is set.
#
# SIGNING: AUTOMATIC code signing via the App Store Connect API key. Codemagic
# generates the Apple Distribution certificate + its PRIVATE KEY and stores them
# as a managed code-signing identity in your Codemagic team, then reuses that
# same identity on every build (Apple never stores the private key, which is why
# the old `fetch-signing-files --create` flow broke on a fresh VM: it re-minted /
# re-downloaded the cert with no usable private key). Because the App ID
# `com.mikabe.emberkeep` and the app record now exist, Codemagic also auto-creates
# (or reuses) the matching App Store provisioning profile.
#
# Before the FIRST run (one-time, Codemagic UI / App Store Connect):
#   1. Teams → Integrations → App Store Connect: the API key integration named
#      `CodemagicASC` must be connected (it already is).
#   2. App ID `com.mikabe.emberkeep` registered + app record created (done;
#      numeric Apple ID 6781401469 below).
#
# PURE SPM: all plugins (firebase_core/auth, cloud_firestore) resolve as Swift
# Packages; there is NO CocoaPods integration in the Xcode project (no Pods
# project in the workspace, no Pods xcconfig includes, no Pods build phases). The
# old hand-authored ios/Podfile + the `cd ios && pod install` step were the only
# CocoaPods residue and have been removed (delete ios/Podfile in the repo). The
# iOS 15 floor that the Podfile used to force is satisfied by the Runner target's
# IPHONEOS_DEPLOYMENT_TARGET = 15.0 (all 3 configs); the Firebase SPM packages
# declare their own iOS 15 minimum.

workflows:
  ios-testflight:
    name: Emberkeep iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: CodemagicASC # ← your App Store Connect integration name
    environment:
      flutter: stable
      xcode: latest
      # Automatic signing: Codemagic creates+persists the distribution cert (and
      # its private key) and the App Store profile, keyed off the integration above.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mikabe.emberkeep
      vars:
        # numeric Apple ID of the app record
        # (App Store Connect → App → App Information → "Apple ID")
        APP_STORE_APPLE_ID: 6781401469
    scripts:
      - name: Flutter packages
        script: |
          flutter pub get
      - name: Set up code signing settings on Xcode project
        script: |
          # Applies the Codemagic-managed App Store profile + distribution cert to
          # the Runner target and writes the export options plist to
          # $CM_EXPORT_OPTIONS_PLIST (the only step needed with automatic signing —
          # NO keychain initialize / fetch-signing-files / add-certificates).
          xcode-project use-profiles
      - name: Flutter build ipa
        script: |
          # First-build-safe build number: no prior TestFlight build (or a failed
          # lookup) degrades to 0, so the first CI run produces build 1 and later
          # runs auto-increment. The version NAME (1.0.0) comes from pubspec.yaml.
          # No `pod install`: this is a pure-SPM project; `flutter build ipa`
          # resolves the Swift packages itself (and would auto-generate a minimal
          # Podfile only if some plugin still required CocoaPods — none do).
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          flutter build ipa --release \
            --build-number=$((LATEST + 1)) \
            --export-options-plist="$CM_EXPORT_OPTIONS_PLIST"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # add beta_groups: [ "Internal" ] to auto-assign your TestFlight testers
